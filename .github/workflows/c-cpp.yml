name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} - ${{ matrix.compiler.name }} ${{ matrix.compiler.version }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
        build_type: [Release, Debug]
        compiler:
          - { name: gcc, version: 11 }
          - { name: clang, version: 14 }
        exclude:
          # Windows 只用 MSVC
          - os: windows-latest
            compiler: { name: gcc }
          - os: windows-latest
            compiler: { name: clang }

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装依赖 (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build
        if [ "${{ matrix.compiler.name }}" = "gcc" ]; then
          sudo apt-get install -y g++-${{ matrix.compiler.version }}
          echo "CC=gcc-${{ matrix.compiler.version }}" >> $GITHUB_ENV
          echo "CXX=g++-${{ matrix.compiler.version }}" >> $GITHUB_ENV
        else
          sudo apt-get install -y clang-${{ matrix.compiler.version }}
          echo "CC=clang-${{ matrix.compiler.version }}" >> $GITHUB_ENV
          echo "CXX=clang++-${{ matrix.compiler.version }}" >> $GITHUB_ENV
        fi

    - name: 配置 CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DEXECUTOR_BUILD_TESTS=ON \
          -DEXECUTOR_BUILD_EXAMPLES=ON \
          -DEXECUTOR_ENABLE_COVERAGE=OFF

    - name: 编译
      run: cmake --build build --config ${{ matrix.build_type }} -j

    - name: 运行测试
      working-directory: build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure --verbose

    - name: 上传构建产物 (Release)
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: executor-${{ matrix.os }}-${{ matrix.compiler.name }}-${{ matrix.compiler.version }}
        path: |
          build/lib*
          build/tests/executor_*_test
        retention-days: 7

  lockfree-tsan:
    name: Ubuntu - GCC 11 - ThreadSanitizer lockfree
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-11
        echo "CC=gcc-11" >> $GITHUB_ENV
        echo "CXX=g++-11" >> $GITHUB_ENV

    - name: 配置 CMake (ThreadSanitizer)
      run: |
        cmake -B build-tsan -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DEXECUTOR_BUILD_TESTS=ON \
          -DEXECUTOR_BUILD_EXAMPLES=OFF \
          -DEXECUTOR_ENABLE_GPU=OFF \
          -DEXECUTOR_ENABLE_CUDA=OFF \
          -DEXECUTOR_ENABLE_COVERAGE=OFF \
          -DEXECUTOR_ENABLE_TSAN=ON

    - name: 编译 LockFreeQueue 测试
      run: cmake --build build-tsan --target test_lockfree_queue_size test_lockfree_mpsc_arm_stress -j

    - name: 运行 LockFreeQueue TSAN 测试
      working-directory: build-tsan
      env:
        TSAN_OPTIONS: halt_on_error=1:history_size=7:second_deadlock_stack=1
      run: ctest --output-on-failure --verbose -R "test_lockfree_(queue_size|mpsc_arm_stress)"

  # 可选：代码覆盖率任务
  coverage:
    name: Code Coverage
    runs-on: ubuntu-22.04
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-11 lcov libgtest-dev
        cd /usr/src/gtest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib

    - name: 配置 CMake (启用覆盖率)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=g++-11 \
          -DEXECUTOR_BUILD_TESTS=ON \
          -DEXECUTOR_ENABLE_COVERAGE=ON

    - name: 编译
      run: cmake --build build -j

    - name: 运行测试
      working-directory: build
      env:
        # Code Coverage build 在 2 vCPU runner 上,mlockall(MCL_CURRENT|MCL_FUTURE)
        # 会触发 OOM-killer。test_realtime_hardening 尊重这个 env 跳过 mlock 调用。
        EXECUTOR_TEST_NO_MLOCKALL: 1
      run: ctest --output-on-failure

    - name: 生成覆盖率报告
      run: |
        cd build
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/examples/*' --output-file coverage.info
        lcov --list coverage.info

    - name: 上传到 Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./build/coverage.info
        flags: unittests
        name: codecov-executor
